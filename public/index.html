<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>Student Management System</h1>
            <p>A simple CRUD application to manage student records</p>
        </div>
    </header>

    <main class="container">
        <section class="form-section shadow-box">
            <h2 id="form-title">Add New Student</h2>
            <form id="student-form">
                <input type="hidden" id="student-id">
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="E.g. John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="E.g. john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="major">Major / Program</label>
                    <input type="text" id="major" placeholder="E.g. Computer Science" required>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn" class="btn btn-primary">Add Student</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary hidden">Cancel Edit</button>
                </div>
            </form>
        </section>

        <section class="list-section shadow-box">
            <h2>Directory</h2>
            <div class="table-responsive">
                <table id="students-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Major</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="student-list">
                        <!-- Student rows will be injected here via JavaScript -->
                    </tbody>
                </table>
            </div>
            <div id="loading" class="text-center mt-20">Loading students...</div>
            <div id="no-data" class="text-center mt-20 hidden">No students found. Add one above!</div>
        </section>
    </main>

    <script src="/script.js"></script>
</body>
</html>
